services:
  - type: web
    name: oee-portal-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: oee-portal-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
    plan: free

databases:
  - name: oee-portal-db
    plan: free
